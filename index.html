<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DV Risk Indicators - Hybrid Interaction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-purple: #513873;
            --brand-mauve: #9C7F9D;
            --brand-bg: #F6F5F8;
            --ui-error: #ef4444; /* Bright Red */
            --ui-success: #22c55e; /* Green */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--brand-bg);
            overscroll-behavior: none;
        }

        /* PC Dragging Style */
        .dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        /* Mobile Selected Style */
        .selected-item {
            border: 3px solid var(--brand-purple) !important;
            box-shadow: 0 0 15px rgba(81, 56, 115, 0.3);
        }

        /* The Error State (Happens inside the zone) */
        .incorrect-placement {
            background-color: #fee2e2 !important;
            border-color: var(--ui-error) !important;
            color: var(--ui-error) !important;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .draggable-item {
            cursor: grab;
            transition: all 0.2s ease;
            touch-action: none; /* Prevents scrolling while interacting */
        }

        .correct-drop {
            background-color: #f0fdf4 !important;
            border-color: var(--ui-success) !important;
            cursor: default;
        }

        .drop-zone {
            min-height: 180px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .drag-over {
            background-color: rgba(81, 56, 115, 0.1) !important;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-[#513873] mb-2">High Risk Indicators</h1>
            <p class="text-gray-600 text-sm italic">Drag or Tap to sort the indicators into the correct categories.</p>
        </div>

        <div id="itemsContainer" class="flex flex-wrap justify-center gap-3 mb-12 min-h-[100px]"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="drop-zone border-2 border-dashed border-[#513873] rounded-2xl p-6 bg-white" data-zone="high">
                <h3 class="text-[#513873] font-bold text-center mb-4 uppercase tracking-wider">High Risk</h3>
                <div class="zone-content space-y-3"></div>
            </div>

            <div class="drop-zone border-2 border-dashed border-[#9C7F9D] rounded-2xl p-6 bg-white" data-zone="low">
                <h3 class="text-[#9C7F9D] font-bold text-center mb-4 uppercase tracking-wider">Abuse & Control</h3>
                <div class="zone-content space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const cardData = [
            { id: 1, cat: 'high', text: '"I will kill you if you leave."', desc: 'Direct indicator of lethal intent.' },
            { id: 2, cat: 'high', text: '"Their hands were around my neck."', desc: 'Strangulation is a high homicide predictor.' },
            { id: 3, cat: 'high', text: '"He showed me the gun."', desc: 'Weapon access significantly escalates risk.' },
            { id: 4, cat: 'high', text: '"I\'m packing my bags to leave."', desc: 'Separation is the most dangerous timeframe.' },
            { id: 5, cat: 'low', text: 'Controls my money.', desc: 'Restricts independence and ability to leave.' },
            { id: 6, cat: 'low', text: 'Calls me names.', desc: 'Emotional abuse used to diminish self-worth.' },
            { id: 7, cat: 'low', text: 'Demands my passwords.', desc: 'Monitoring used to exert power.' },
            { id: 8, cat: 'low', text: 'Tells me I\'m "crazy".', desc: 'Gaslighting used to make victims doubt reality.' }
        ];

        let selectedItem = null; // For Mobile Tap
        const itemsContainer = document.getElementById('itemsContainer');

        function init() {
            cardData.sort(() => Math.random() - 0.5).forEach(data => {
                const el = document.createElement('div');
                el.className = 'draggable-item bg-white border-2 border-gray-200 p-4 rounded-xl shadow-sm w-full max-w-[250px] text-sm font-semibold text-center';
                el.innerText = data.text;
                el.draggable = true;
                el.dataset.id = data.id;
                el.dataset.category = data.cat;

                // PC: Drag Events
                el.addEventListener('dragstart', (e) => {
                    el.classList.add('dragging');
                    e.dataTransfer.setData('text/plain', data.id);
                });
                el.addEventListener('dragend', () => el.classList.remove('dragging'));

                // Mobile: Tap Events
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (el.classList.contains('correct-drop')) return;
                    if (selectedItem) selectedItem.classList.remove('selected-item');
                    selectedItem = el;
                    el.classList.add('selected-item');
                });

                itemsContainer.appendChild(el);
            });

            // Zone Logic
            document.querySelectorAll('.drop-zone').forEach(zone => {
                // PC: Drag Over
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    zone.classList.add('drag-over');
                });
                zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));

                // PC: Drop
                zone.addEventListener('drop', (e) => {
                    zone.classList.remove('drag-over');
                    const id = e.dataTransfer.getData('text/plain');
                    const draggedEl = document.querySelector(`[data-id="${id}"]`);
                    validatePlacement(draggedEl, zone);
                });

                // Mobile: Zone Click
                zone.addEventListener('click', () => {
                    if (selectedItem) {
                        validatePlacement(selectedItem, zone);
                    }
                });
            });
        }

        function validatePlacement(item, zone) {
            const isCorrect = item.dataset.category === zone.dataset.zone;
            const zoneContent = zone.querySelector('.zone-content');

            if (isCorrect) {
                // SUCCESS
                const info = cardData.find(d => d.id == item.dataset.id);
                item.classList.remove('selected-item', 'incorrect-placement');
                item.classList.add('correct-drop');
                item.draggable = false;
                item.innerHTML = `<div>${info.text}</div><div class="text-[11px] font-normal mt-2 pt-2 border-t border-green-200 text-green-700">${info.desc}</div>`;
                zoneContent.appendChild(item);
                selectedItem = null;
            } else {
                // FAILURE: Show Red inside the zone, then move back
                item.classList.remove('selected-item');
                item.classList.add('incorrect-placement');
                zoneContent.appendChild(item); // Visually "drops" it in the wrong spot first

                setTimeout(() => {
                    item.classList.remove('incorrect-placement');
                    itemsContainer.appendChild(item); // Move back to start
                }, 600);
                selectedItem = null;
            }
        }

        init();
    </script>
</body>
</html>
