<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Responsive Risk Sort</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --purple-dark: #3E3054;
            --purple-light: #7D6B91;
            --bg-soft: #F6F5F8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-soft);
            overflow-x: hidden;
        }

        /* --- Desktop Specific --- */
        .draggable-item {
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: none;
        }
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .drop-zone { min-height: 200px; transition: all 0.3s ease; }
        .drag-over { background-color: rgba(62, 48, 84, 0.1) !important; border-style: solid !important; }

        /* --- Mobile Swipe Specific --- */
        #mobileContainer {
            display: none;
            height: 350px; /* Ergonomic requirement */
            position: relative;
            perspective: 1000px;
            touch-action: none;
            margin-bottom: 2rem;
        }

        .swipe-card {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 85%; /* Slightly smaller card */
            height: 200px; /* Reduced height */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 2px solid var(--purple-light);
            user-select: none;
            transition: transform 0.1s ease-out;
            font-weight: 600;
            color: var(--purple-dark);
        }

        .swipe-label {
            font-size: 0.85rem;
            font-weight: 800; /* Bold/Darker text */
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #1a1a1a; /* Darker for accessibility */
        }

        @media (max-width: 767px) {
            #desktopView { display: none; }
            #mobileContainer { display: block; }
        }

        /* --- Summary View --- */
        .summary-hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="gameContainer" class="max-w-5xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-[#3E3054] mb-2">Risk Indicator Sort</h1>
            <p id="instruction" class="text-gray-800 text-sm md:text-base font-medium px-4">
                Swipe left for a Control situation, or right for a High Risk situation
            </p>
        </div>

        <div id="desktopView">
            <div id="itemsContainer" class="flex flex-wrap justify-center gap-3 mb-10 min-h-[100px]"></div>
            <div class="grid grid-cols-2 gap-6">
                <div class="drop-zone border-2 border-dashed border-[#7D6B91] rounded-2xl p-6 bg-white" data-zone="low">
                    <h3 class="text-[#7D6B91] font-bold text-center mb-4 uppercase">Abuse & Control</h3>
                    <div class="zone-content space-y-3"></div>
                </div>
                <div class="drop-zone border-2 border-dashed border-[#3E3054] rounded-2xl p-6 bg-white" data-zone="high">
                    <h3 class="text-[#3E3054] font-bold text-center mb-4 uppercase">High Risk</h3>
                    <div class="zone-content space-y-3"></div>
                </div>
            </div>
        </div>

        <div id="mobileContainer">
            <div id="cardStack" class="relative w-full h-full"></div>
            <div class="flex justify-between items-center mt-6 px-2">
                <span class="swipe-label">← Swipe Left <br><span class="text-[10px] font-normal">Control</span></span>
                <span class="swipe-label text-right">Swipe Right → <br><span class="text-[10px] font-normal">High Risk</span></span>
            </div>
        </div>
    </div>

    <div id="summaryView" class="max-w-4xl mx-auto summary-hidden">
        <h2 class="text-2xl font-bold text-center text-[#3E3054] mb-8">Classification Summary</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-[#7D6B91]">
                <h3 class="font-bold text-[#7D6B91] mb-4">Abuse & Control</h3>
                <ul id="list-low" class="space-y-2 text-sm list-disc pl-5"></ul>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-[#3E3054]">
                <h3 class="font-bold text-[#3E3054] mb-4">High Risk Indicators</h3>
                <ul id="list-high" class="space-y-2 text-sm list-disc pl-5"></ul>
            </div>
        </div>
        <div class="text-center mt-10">
            <button onclick="location.reload()" class="bg-[#3E3054] text-white px-8 py-3 rounded-full font-bold shadow-lg active:scale-95 transition-transform">Restart Activity</button>
        </div>
    </div>

    <script>
        const cardData = [
            { id: 1, cat: 'high', text: '"I will kill you if you leave."' },
            { id: 2, cat: 'high', text: '"Their hands were around my neck."' },
            { id: 3, cat: 'high', text: '"He showed me the gun."' },
            { id: 4, cat: 'high', text: '"I\'m packing my bags to leave."' },
            { id: 5, cat: 'low', text: 'Controls my money.' },
            { id: 6, cat: 'low', text: 'Calls me names.' },
            { id: 7, cat: 'low', text: 'Demands my passwords.' },
            { id: 8, cat: 'low', text: 'Tells me I\'m "crazy".' }
        ];

        let sortedData = { high: [], low: [] };
        const totalItems = cardData.length;

        function init() {
            const shuffled = [...cardData].sort(() => Math.random() - 0.5);
            renderDesktop(shuffled);
            renderMobile(shuffled);
        }

        function renderDesktop(items) {
            const container = document.getElementById('itemsContainer');
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'draggable-item bg-white border-2 border-gray-200 p-4 rounded-xl shadow-sm w-48 text-center text-sm font-semibold';
                el.innerText = item.text;
                el.draggable = true;
                el.dataset.id = item.id;
                
                el.addEventListener('dragstart', (e) => {
                    el.classList.add('dragging');
                    e.dataTransfer.setData('text/plain', item.id);
                });
                el.addEventListener('dragend', () => el.classList.remove('dragging'));
                container.appendChild(el);
            });

            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    zone.classList.add('drag-over');
                });
                zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', (e) => {
                    zone.classList.remove('drag-over');
                    const id = e.dataTransfer.getData('text/plain');
                    const item = cardData.find(c => c.id == id);
                    if(item) {
                        handlePlacement(item, zone.dataset.zone);
                        const el = document.querySelector(`[data-id="${id}"]`);
                        if(el) el.remove();
                    }
                });
            });
        }

        function renderMobile(items) {
            const stack = document.getElementById('cardStack');
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'swipe-card';
                card.style.zIndex = items.length - index;
                card.innerText = item.text;
                
                let startX = 0;
                let currentX = 0;

                card.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                }, {passive: true});

                card.addEventListener('touchmove', (e) => {
                    currentX = e.touches[0].clientX - startX;
                    const rotation = currentX / 15;
                    card.style.transform = `translate(-50%, -50%) translateX(${currentX}px) rotate(${rotation}deg)`;
                }, {passive: true});

                card.addEventListener('touchend', (e) => {
                    if (Math.abs(currentX) > 100) {
                        const direction = currentX > 0 ? 'high' : 'low';
                        card.style.transition = 'transform 0.3s ease-out, opacity 0.3s';
                        card.style.transform = `translate(-50%, -50%) translateX(${currentX * 3}px) rotate(${currentX / 2}deg)`;
                        card.style.opacity = '0';
                        setTimeout(() => card.remove(), 300);
                        handlePlacement(item, direction);
                    } else {
                        card.style.transform = 'translate(-50%, -50%) translateX(0px) rotate(0deg)';
                    }
                    currentX = 0;
                });

                stack.appendChild(card);
            });
        }

        function handlePlacement(item, category) {
            sortedData[category].push(item.text);
            const currentTotal = sortedData.high.length + sortedData.low.length;
            
            if (window.innerWidth >= 768) {
                const zone = document.querySelector(`[data-zone="${category}"] .zone-content`);
                const feedback = document.createElement('div');
                feedback.className = 'p-3 bg-gray-50 rounded-lg border border-gray-100 text-xs font-medium text-gray-700';
                feedback.innerText = item.text;
                zone.appendChild(feedback);
            }

            if (currentTotal === totalItems) {
                setTimeout(showSummary, 600);
            }
        }

        function showSummary() {
            document.getElementById('gameContainer').classList.add('summary-hidden');
            const summary = document.getElementById('summaryView');
            summary.classList.remove('summary-hidden');

            ['high', 'low'].forEach(cat => {
                const list = document.getElementById(`list-${cat}`);
                list.innerHTML = '';
                sortedData[cat].forEach(text => {
                    const li = document.createElement('li');
                    li.className = 'mb-1';
                    li.innerText = text;
                    list.appendChild(li);
                });
            });
        }

        init();
    </script>
</body>
</html>
